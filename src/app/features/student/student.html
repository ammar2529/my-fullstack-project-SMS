<div class="students-page">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h4>Students</h4>
      <p class="text-muted">Manage all students</p>
    </div>
    <button class="btn btn-primary" (click)="openAdd()">
      <i class="bi bi-plus-lg me-2"></i>Add Student
    </button>
  </div>

  <!-- Table -->
  <app-reusable-table
    [columns]="columns"
    [data]="students()"
    [loading]="loading()"
    (onEdit)="openEdit($event)"
    (onDelete)="onDelete($event)" />

  <!-- Form Modal -->
  <app-reusable-form
    [title]="isEdit() ? 'Edit Student' : 'Add Student'"
    [fields]="formFields"
    [model]="editModel()"
    [loading]="formLoading()"
    [visible]="formVisible()"
    (onSave)="onSave($event)"
    (onCancel)="onCancel()" />

</div>
